name: Release

# The installer version comes from installer/anchor.iss (#define MyAppVersion)
# and drives OutputBaseFilename (Anchor-<version>-setup.exe). Keep MyAppVersion
# in step with the pushed git tag and the csproj <Version>.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup 6
        run: choco install innosetup -y

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $iss = Get-Content installer/anchor.iss -Raw
          if ($iss -notmatch '#define\s+MyAppVersion\s+"([^"]+)"') {
            throw 'Could not find MyAppVersion in installer/anchor.iss.'
          }

          $version = $Matches[1]
          $tag = "v$version"

          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -ne $tag) {
            throw "Pushed tag '$env:GITHUB_REF_NAME' does not match installer version '$tag'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=Anchor $version" >> $env:GITHUB_OUTPUT

      - name: Publish and compile installer
        run: pwsh -File scripts/build-installer.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.version.outputs.name }}
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/installer/*.exe
